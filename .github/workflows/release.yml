name: Release

# Builds signed installers for Windows / macOS / Linux and publishes a GitHub
# release (with the updater's latest.json) whenever a v* tag is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest # arm64 (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # x86_64 (Intel)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      # Override the repo's .cargo/config.toml target-dir (F:/claude/builds/…
      # exists only on the dev machine). A short path also keeps the Windows
      # Vulkan shader sub-build under MAX_PATH.
      CARGO_TARGET_DIR: ${{ matrix.platform == 'windows-latest' && 'C:\st' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev patchelf

      - name: Vulkan SDK (Windows GPU build)
        if: matrix.platform == 'windows-latest'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang
          vulkan-use-cache: true

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Install frontend dependencies
        working-directory: sussurro
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sussurro
          tagName: ${{ github.ref_name }}
          releaseName: "Sussurro ${{ github.ref_name }}"
          releaseBody: "Local voice dictation. See README for setup (Ollama + a Whisper/Parakeet model)."
          releaseDraft: true
          args: ${{ matrix.args }}
