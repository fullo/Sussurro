name: Release

# Builds signed installers for Windows / macOS / Linux and publishes a GitHub
# release (with the updater's latest.json) whenever a v* tag is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # arm64 only: ort (onnxruntime) has no prebuilt binaries for
          # x86_64-apple-darwin, so Intel macOS is not supported.
          - platform: macos-latest # arm64 (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          # 24.04: the ort (onnxruntime) prebuilt binaries need glibc >= 2.38
          - platform: ubuntu-24.04
            args: ""

    runs-on: ${{ matrix.platform }}

    env:
      ORT_CACHE_DIR: ${{ github.workspace }}/.ort-cache

    steps:
      - uses: actions/checkout@v5

      # cdn.pyke.io (ort's prebuilt ONNX Runtime) intermittently 403s GitHub
      # runners; a populated cache skips the download entirely.
      - name: ONNX Runtime binaries cache
        uses: actions/cache@v6
        with:
          path: .ort-cache
          key: ort-bin-${{ runner.os }}-${{ hashFiles('sussurro/src-tauri/Cargo.lock') }}
          restore-keys: ort-bin-${{ runner.os }}-

      # On Windows a SHORT cargo target dir is mandatory: the Vulkan shader
      # sub-build exceeds MAX_PATH otherwise (MSBuild FTK1011).
      - name: Cargo target dir (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo 'CARGO_TARGET_DIR=C:\st' >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev patchelf

      - name: Vulkan SDK (Windows GPU build)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $urls = @(
            'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe',
            'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe'
          )
          foreach ($u in $urls) {
            try { Invoke-WebRequest $u -OutFile vulkan_sdk.exe -ErrorAction Stop; break } catch {}
          }
          Start-Process .\vulkan_sdk.exe -ArgumentList '--accept-licenses','--default-answer','--confirm-command','install' -Wait
          $sdk = (Get-ChildItem C:\VulkanSDK | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Install frontend dependencies
        working-directory: sussurro
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sussurro
          tagName: ${{ github.ref_name }}
          releaseName: "Sussurro ${{ github.ref_name }}"
          releaseBody: "Local voice dictation. See README for setup (Ollama + a Whisper/Parakeet model)."
          releaseDraft: true
          args: ${{ matrix.args }}

  # Experimental Flatpak bundle (since 0.3.10): repack of the Linux .deb on
  # the GNOME runtime (ships Tauri's webkit2gtk-4.1). Attached to the same
  # draft release. Flathub submission waits for the public repo (0.5.0).
  flatpak:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install flatpak-builder and the GNOME runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Download the deb from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} \
            --pattern '*_amd64.deb' --output flatpak/sussurro.deb

      - name: Build the bundle
        run: |
          flatpak-builder --user --force-clean --repo=export build-dir flatpak/com.sussurro.app.yml
          flatpak build-bundle export "sussurro_${GITHUB_REF_NAME#v}_x86_64.flatpak" com.sussurro.app

      - name: Upload to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} sussurro_*.flatpak --repo ${{ github.repository }} --clobber
