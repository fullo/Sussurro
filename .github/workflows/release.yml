name: Release

# Builds signed installers for Windows / macOS / Linux and publishes a GitHub
# release (with the updater's latest.json) whenever a v* tag is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # arm64 only: ort (onnxruntime) has no prebuilt binaries for
          # x86_64-apple-darwin, so Intel macOS is not supported.
          - platform: macos-latest # arm64 (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          # 24.04: the ort (onnxruntime) prebuilt binaries need glibc >= 2.38
          - platform: ubuntu-24.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Override the repo's .cargo/config.toml target-dir (F:/claude/builds/…
      # exists only on the dev machine). On Windows a SHORT path is mandatory:
      # the Vulkan shader sub-build exceeds MAX_PATH otherwise.
      - name: Cargo target dir
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo 'CARGO_TARGET_DIR=C:\st' >> "$GITHUB_ENV"
          else
            echo "CARGO_TARGET_DIR=$GITHUB_WORKSPACE/cargo-target" >> "$GITHUB_ENV"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev patchelf

      - name: Vulkan SDK (Windows GPU build)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $urls = @(
            'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe',
            'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe'
          )
          foreach ($u in $urls) {
            try { Invoke-WebRequest $u -OutFile vulkan_sdk.exe -ErrorAction Stop; break } catch {}
          }
          Start-Process .\vulkan_sdk.exe -ArgumentList '--accept-licenses','--default-answer','--confirm-command','install' -Wait
          $sdk = (Get-ChildItem C:\VulkanSDK | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Install frontend dependencies
        working-directory: sussurro
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sussurro
          tagName: ${{ github.ref_name }}
          releaseName: "Sussurro ${{ github.ref_name }}"
          releaseBody: "Local voice dictation. See README for setup (Ollama + a Whisper/Parakeet model)."
          releaseDraft: true
          args: ${{ matrix.args }}
