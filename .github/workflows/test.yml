name: Test

# Fast feedback on every push/PR: frontend type-check + full Rust test suite.
# Runs on Ubuntu (CPU-only whisper build — no Vulkan SDK needed).
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    # 24.04: the ort (onnxruntime) prebuilt binaries need glibc >= 2.38
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # Override the repo's .cargo/config.toml target-dir (F:/claude/builds/…
      # exists only on the Windows dev machine; on Linux the drive-letter path
      # is relative and its ':' breaks cargo's LD_LIBRARY_PATH joining).
      - name: Cargo target dir
        run: echo "CARGO_TARGET_DIR=$GITHUB_WORKSPACE/cargo-target" >> "$GITHUB_ENV"

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Frontend build (type-check)
        working-directory: sussurro
        run: |
          npm ci
          npm run build

      - name: Rust tests
        working-directory: sussurro/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: sussurro/src-tauri
        run: cargo clippy --all-targets
