name: Test

# Fast feedback on every push/PR: frontend type-check + full Rust test suite.
# Runs on Ubuntu (CPU-only whisper build — no Vulkan SDK needed).
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    # 24.04: the ort (onnxruntime) prebuilt binaries need glibc >= 2.38
    runs-on: ubuntu-24.04
    env:
      ORT_CACHE_DIR: ${{ github.workspace }}/.ort-cache
    steps:
      - uses: actions/checkout@v5

      # cdn.pyke.io (ort's prebuilt ONNX Runtime) intermittently 403s GitHub
      # runners. ort-sys skips the download when its cache dir is already
      # populated, so persist it across runs.
      - name: ONNX Runtime binaries cache
        uses: actions/cache@v6
        with:
          path: .ort-cache
          key: ort-bin-${{ runner.os }}-${{ hashFiles('sussurro/src-tauri/Cargo.lock') }}
          restore-keys: ort-bin-${{ runner.os }}-

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Frontend build (type-check)
        working-directory: sussurro
        run: |
          npm ci
          npm run build

      - name: Rust tests
        working-directory: sussurro/src-tauri
        # Retry the build: on a cold ORT cache the ort-sys download can hit
        # the CDN's 403 rate limit. Tests themselves run once.
        run: |
          for i in 1 2 3 4 5; do
            if cargo test --no-run; then
              break
            fi
            if [ "$i" = 5 ]; then exit 1; fi
            echo "::warning::build attempt $i failed (flaky ort CDN?) — retrying in 90s"
            sleep 90
          done
          cargo test

      - name: Clippy
        working-directory: sussurro/src-tauri
        run: cargo clippy --all-targets
