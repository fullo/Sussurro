name: Test

# Fast feedback on every push/PR: frontend type-check + full Rust test suite.
# Runs on Ubuntu (CPU-only whisper build — no Vulkan SDK needed).
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    # 24.04: the ort (onnxruntime) prebuilt binaries need glibc >= 2.38
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # cdn.pyke.io (ort's own prebuilt download) 403s GitHub runners, so link
      # dynamically against Microsoft's official ONNX Runtime release instead.
      # Keep the version in sync with what the locked ort-sys expects (see the
      # ms@<version> URLs in its build/download/dist.txt).
      - name: ONNX Runtime (Microsoft build)
        run: |
          ORT_VERSION=1.24.2
          curl -fsSL --retry 5 --retry-delay 10 -o ort.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xzf ort.tgz
          echo "ORT_LIB_LOCATION=$PWD/onnxruntime-linux-x64-${ORT_VERSION}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/onnxruntime-linux-x64-${ORT_VERSION}/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev \
            libxdo-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: sussurro/src-tauri

      - name: Frontend build (type-check)
        working-directory: sussurro
        run: |
          npm ci
          npm run build

      - name: Rust tests
        working-directory: sussurro/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: sussurro/src-tauri
        run: cargo clippy --all-targets

      # Minimal E2E: the real app binary starts under Xvfb and creates its
      # window. Catches broken plugin init, asset embedding, webview wiring —
      # things unit tests can't see.
      - name: E2E smoke (app launches, window exists)
        working-directory: sussurro
        env:
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: |
          sudo apt-get install -y xvfb xdotool
          npm run tauri build -- --debug --no-bundle
          xvfb-run -a bash -c '
            ./src-tauri/target/debug/sussurro &
            APP_PID=$!
            for i in $(seq 1 30); do
              if xdotool search --name "Sussurro" >/dev/null 2>&1; then
                echo "OK: window found after ${i}s"
                kill $APP_PID
                exit 0
              fi
              if ! kill -0 $APP_PID 2>/dev/null; then
                echo "FAIL: app process died"
                exit 1
              fi
              sleep 1
            done
            echo "FAIL: window never appeared"
            kill $APP_PID
            exit 1
          '
